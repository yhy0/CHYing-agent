services:
  chying-agent-docker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: chying-full
    image: chying-agent-docker-tools:latest
    container_name: chying-agent-docker
    hostname: chying-agent-docker
    stdin_open: true
    tty: true
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    shm_size: '2g'
    ports:
      - "8766:8766"
      - "8089:8089"
    volumes:
      - ../agent-work:/root/agent-work
      - kali-tools-config:/root/.config
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - ENABLE_C2_AGENT=true
    restart: unless-stopped

volumes:
  kali-tools-config:
    driver: local
